<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title> GitHub Issues Tracker</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

    <script>

const isLoggedIn = localStorage.getItem("loggedIn");

if(!isLoggedIn){
  window.location.href = "index.html";
}

</script>

<nav class="navbar">

<div class="logo-area">
<h2> 
GitHub Issues Tracker</h2>
</div>

<div class="search-area">

<input type="text" id="searchInput" placeholder="Search issues">
<button id="searchBtn">Search</button>

</div>

</nav>

<section class="tabs">

<button class="tab active" data-status="all">All</button>
<button class="tab" data-status="open">Open</button>
<button class="tab" data-status="closed">Closed</button>

</section>

<section id="issueStats">
<p id="issueCount"></p>
</section>

<section class="issues-container" id="issuesContainer">

</section>

<div id="spinner" class="spinner hidden"></div>

<div id="issueModal" class="modal hidden">
<div class="modal-content">

<span id="closeModal">X</span>

<h2 id="modalTitle"></h2>
<p id="modalDesc"></p>

<div id="modalInfo"></div>

</div>
</div>

<script src="script.js"></script>

</body>
</html>
